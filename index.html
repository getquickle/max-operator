<title>Max — Founder Ascent System</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Max FOUNDER ASCENT SYSTEM
   Expedition execution dashboard
   ============================================================ */

:root {
  --bg:           #0c0d0e;
  --bg-elev:     #131418;
  --surface:     #181a1f;
  --surface-2:   #1f222a;
  --border:      #2b2f37;
  --border-soft: #22252c;

  --text:        #e8e3d6;
  --text-2:      #b8b1a0;
  --text-mute:   #6e6a5e;
  --text-faint:  #44423a;

  --accent:      #d97742;
  --accent-dim:  #8a4a26;
  --accent-soft: rgba(217,119,66,0.10);

  --signal:      #b85c3c;
  --moss:        #7a9268;
  --cyan:        #5b8a99;

  --grid:        rgba(255,255,255,0.025);

  --pad:         16px;
  --radius:      2px;

  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;
}

* { box-sizing: border-box; }

html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.55;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: 0.005em;
  padding-bottom: 100px;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(ellipse 1200px 800px at 80% -10%, rgba(217,119,66,0.06), transparent 60%),
    radial-gradient(ellipse 800px 600px at -10% 100%, rgba(91,138,153,0.04), transparent 60%);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.18;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800' viewBox='0 0 800 800'><g fill='none' stroke='%23a89e8a' stroke-width='0.4' opacity='0.4'><path d='M -50 420 Q 100 380 220 410 T 480 400 T 750 430 T 950 410'/><path d='M -50 440 Q 100 400 220 430 T 480 420 T 750 450 T 950 430'/><path d='M -50 470 Q 100 430 220 460 T 480 450 T 750 480 T 950 460'/><path d='M -50 510 Q 100 470 220 500 T 480 490 T 750 520 T 950 500'/><path d='M -50 560 Q 100 520 220 550 T 480 540 T 750 570 T 950 550'/><path d='M -50 620 Q 100 580 220 610 T 480 600 T 750 630 T 950 610'/><path d='M -50 690 Q 100 650 220 680 T 480 670 T 750 700 T 950 680'/><path d='M -50 200 Q 200 160 350 190 T 600 180 T 850 210'/><path d='M -50 220 Q 200 180 350 210 T 600 200 T 850 230'/><path d='M -50 250 Q 200 210 350 240 T 600 230 T 850 260'/><path d='M -50 290 Q 200 250 350 280 T 600 270 T 850 300'/><path d='M -50 340 Q 200 300 350 330 T 600 320 T 850 350'/></g></svg>");
  background-size: 1200px 1200px;
  background-position: center;
}

main { position: relative; z-index: 1; }

/* ---------- header / command bar ---------- */
.cmd {
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(19,20,24,0.85), rgba(12,13,14,0.85));
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.cmd-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 14px var(--pad) 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: end;
}
.cmd-brand {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 18px;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text);
}
.cmd-brand .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-dim);
  flex-shrink: 0;
}
.cmd-meta {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--text-mute);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.4;
}
.cmd-meta b { color: var(--text-2); font-weight: 500; }

.wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 var(--pad);
}

.hero {
  padding: 32px 0 28px;
  border-bottom: 1px solid var(--border-soft);
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--text-mute);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.hero-eyebrow .pipe { color: var(--text-faint); }
.hero-day {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(40px, 9vw, 64px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--text);
  margin: 0;
}
.hero-day em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.hero-mission {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.hero-mission .bar { width: 18px; height: 1px; background: var(--accent); }

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  margin: 0 calc(-1 * var(--pad));
}
.stat {
  padding: 16px var(--pad);
  border-right: 1px solid var(--border-soft);
  position: relative;
}
.stat:last-child { border-right: none; }
.stat-label {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-mute);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.stat-value {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}
.stat-value .unit {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  letter-spacing: 0.12em;
  margin-left: 4px;
}
.stat-value.muted { color: var(--text-mute); }
.stat-value.accent { color: var(--accent); }
.stat-value.moss { color: var(--moss); }

.gate {
  margin: 36px 0;
  padding: 28px 22px;
  border: 1px solid var(--border);
  background: var(--surface);
  position: relative;
}
.gate::before {
  content: 'SYS // 01';
  position: absolute;
  top: -1px; left: 14px;
  transform: translateY(-50%);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  background: var(--bg);
  padding: 0 8px;
  color: var(--accent);
}
.gate-q {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: -0.005em;
  margin: 0 0 18px;
  color: var(--text);
}
.gate-sub {
  font-size: 11px;
  color: var(--text-mute);
  letter-spacing: 0.08em;
  margin-bottom: 18px;
  text-transform: uppercase;
}
.gate-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.gate-btn {
  padding: 18px 14px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.gate-btn small {
  font-size: 9px;
  color: var(--text-mute);
  letter-spacing: 0.18em;
  font-weight: 400;
}
.gate-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.gate-btn:hover small { color: var(--accent-dim); }
.gate-btn:active { transform: translateY(1px); }

.sleep-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  margin: 24px 0 8px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--accent);
}
.sleep-status-text {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-2);
}
.sleep-status-text b { color: var(--accent); font-weight: 600; }
.sleep-status button {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-mute);
  background: transparent;
  border: 1px solid var(--border);
  padding: 6px 10px;
  cursor: pointer;
}
.sleep-status button:hover { color: var(--accent); border-color: var(--accent); }

.section {
  margin: 28px 0;
  border: 1px solid var(--border-soft);
  background: rgba(20, 22, 26, 0.7);
}
.section-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.section-head-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
  min-width: 0;
}
.section-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--accent);
}
.section-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--text);
  margin: 0;
}
.section-title em {
  font-style: italic;
  color: var(--text-2);
  font-weight: 300;
}
.section-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-mute);
  padding: 3px 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  white-space: nowrap;
  flex-shrink: 0;
}
.section-tag.reduced { color: var(--signal); border-color: rgba(184,92,60,0.3); }
.section-tag.full { color: var(--moss); border-color: rgba(122,146,104,0.3); }
.section-body { padding: 10px 0 6px; }

.task {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  cursor: pointer;
  border-top: 1px solid transparent;
  border-bottom: 1px solid var(--border-soft);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s ease;
  min-height: 56px;
}
.section-body .task:last-child { border-bottom: none; }
.task:hover { background: rgba(255,255,255,0.015); }

.task-box {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  margin-top: 2px;
  position: relative;
  transition: all 0.15s ease;
}
.task-box::after {
  content: '';
  position: absolute;
  inset: 4px;
  background: var(--accent);
  transform: scale(0);
  transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.task.checked .task-box {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.task.checked .task-box::after { transform: scale(1); }
.task.checked .task-text { color: var(--text-mute); }
.task.checked .task-text strong { color: var(--text-2); text-decoration: line-through; text-decoration-color: var(--text-faint); }

.task-main { flex: 1; min-width: 0; }
.task-text {
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.45;
  color: var(--text);
  transition: color 0.15s ease;
}
.task-text strong { font-weight: 600; color: var(--text); }
.task-detail {
  font-size: 11px;
  color: var(--text-mute);
  line-height: 1.55;
  margin-top: 6px;
  letter-spacing: 0.01em;
}
.task-detail ul { margin: 4px 0 0; padding-left: 16px; }
.task-detail ul li { margin-bottom: 2px; }

.task-rounds {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--bg-elev);
  border-left: 2px solid var(--accent-dim);
  font-size: 12px;
  color: var(--text-2);
}
.task-rounds-hd {
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--text-mute);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.task-rounds ul { margin: 0; padding-left: 16px; list-style: none; }
.task-rounds ul li { position: relative; padding-left: 0; }
.task-rounds ul li::before {
  content: '—';
  color: var(--text-faint);
  position: absolute;
  left: -14px;
}

/* ---------- meal block ---------- */
.meal-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.section-body .meal-item:last-child { border-bottom: none; }
.meal-item:hover { background: rgba(255,255,255,0.015); }
.meal-time {
  flex-shrink: 0;
  width: 78px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--text-mute);
  text-transform: uppercase;
  padding-top: 4px;
}
.meal-time b {
  display: block;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 2px;
}
.meal-content { flex: 1; min-width: 0; display: flex; gap: 12px; }
.meal-content .task-box { margin-top: 4px; }
.meal-body { flex: 1; }
.meal-list {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
}
.meal-list .b { color: var(--text-mute); margin-right: 6px; }
.meal-item.checked .meal-list { color: var(--text-mute); text-decoration: line-through; text-decoration-color: var(--text-faint); }
.meal-item.checked .task-box { border-color: var(--accent); background: var(--accent-soft); }
.meal-item.checked .task-box::after { transform: scale(1); }
.meal-note {
  font-size: 11px;
  color: var(--text-mute);
  margin-top: 6px;
  font-style: italic;
}

/* ---------- protein reference card ---------- */
.protein-ref {
  margin: 14px 16px 6px;
  background: var(--bg-elev);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--accent-dim);
}
.protein-ref summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.protein-ref summary::-webkit-details-marker { display: none; }
.protein-ref-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-2);
}
.protein-ref-title .glyph { color: var(--accent); margin-right: 8px; }
.protein-ref[open] .collapse-chev { transform: rotate(45deg); color: var(--accent); }
.protein-ref-body {
  padding: 0 14px 14px;
  border-top: 1px solid var(--border-soft);
  padding-top: 12px;
}
.protein-tier {
  margin-bottom: 16px;
}
.protein-tier:last-child { margin-bottom: 0; }
.protein-tier-hd {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-soft);
}
.protein-tier-hd .name {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
}
.protein-tier-hd .meta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-mute);
}
.protein-tier.tier1 .name { color: var(--accent); }
.protein-tier.tier2 .name { color: var(--moss); }
.protein-tier.tier3 .name { color: var(--text-2); }
.protein-tier.resilience .name { color: var(--cyan); }
.protein-tier.removed .name { color: var(--signal); }

.protein-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.protein-list .food-item {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas: "name score" "note note";
  gap: 2px 8px;
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border-soft);
}
.protein-list .food-name {
  grid-area: name;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.protein-list .food-score {
  grid-area: score;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--text-mute);
  align-self: center;
}
.protein-list .food-note {
  grid-area: note;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  line-height: 1.5;
}
.protein-tier.tier1 .food-item { border-left: 2px solid var(--accent); }
.protein-tier.tier2 .food-item { border-left: 2px solid var(--moss); }
.protein-tier.tier3 .food-item { border-left: 2px solid var(--text-mute); }
.protein-tier.resilience .food-item { border-left: 2px solid var(--cyan); }
.protein-tier.removed .food-item {
  border-left: 2px solid var(--signal);
  opacity: 0.55;
}
.protein-tier.removed .food-name {
  text-decoration: line-through;
  text-decoration-color: var(--signal);
  color: var(--text-mute);
}
.protein-portion {
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-2);
  line-height: 1.6;
}
.protein-portion b { color: var(--accent); font-weight: 500; }
.protein-warn {
  margin-top: 10px;
  padding: 8px 10px;
  background: rgba(184,92,60,0.06);
  border-left: 2px solid var(--signal);
  font-size: 11px;
  color: var(--text-2);
  line-height: 1.55;
}
.protein-warn b { color: var(--signal); font-weight: 600; }

/* ---------- collapsibles ---------- */
.collapse {
  margin: 14px 0;
  border: 1px solid var(--border-soft);
  background: var(--bg-elev);
}
.collapse summary {
  list-style: none;
  cursor: pointer;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
}
.collapse summary::-webkit-details-marker { display: none; }
.collapse-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-2);
}
.collapse-title .glyph { color: var(--accent); margin-right: 10px; }
.collapse-chev {
  color: var(--text-mute);
  font-family: var(--mono);
  font-size: 12px;
  transition: transform 0.2s ease;
}
.collapse[open] .collapse-chev { transform: rotate(45deg); color: var(--accent); }
.collapse-body {
  padding: 4px 16px 16px;
  border-top: 1px solid var(--border-soft);
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.7;
}
.collapse-body p { margin: 10px 0; }
.collapse-body strong { color: var(--text); font-weight: 600; }
.collapse-body .rule {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.collapse-body .rule:last-child { border-bottom: none; }
.collapse-body .rule-trigger {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--signal);
  width: 110px;
  flex-shrink: 0;
  padding-top: 2px;
}
.collapse-body .rule-action { flex: 1; color: var(--text); }
.banned-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.banned-grid span {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-mute);
  padding: 8px 10px;
  border: 1px dashed var(--border);
  background: var(--bg);
  text-align: center;
  text-transform: lowercase;
  letter-spacing: 0.02em;
  position: relative;
}
.banned-grid span::before {
  content: '✕';
  color: var(--signal);
  margin-right: 6px;
  font-size: 10px;
}

.rules-card {
  margin: 20px 0;
  padding: 18px 18px 16px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--accent);
}
.rules-card-hd {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.rules-card ul {
  margin: 0;
  padding: 0;
  list-style: none;
  font-family: var(--serif);
}
.rules-card li {
  padding: 6px 0;
  font-size: 17px;
  font-weight: 300;
  letter-spacing: -0.005em;
  color: var(--text);
  position: relative;
  padding-left: 20px;
}
.rules-card li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--accent);
}

/* ---------- prime execution rule banner ---------- */
.prime-banner {
  margin: 24px 0 8px;
  padding: 0;
  background: var(--bg-elev);
  border: 1px solid var(--accent);
  position: relative;
  overflow: hidden;
}
.prime-banner::before {
  content: 'PRIME RULE';
  position: absolute;
  top: 0; left: 0;
  background: var(--accent);
  color: var(--bg);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.24em;
  padding: 4px 10px;
  font-weight: 600;
}
.prime-banner-body {
  padding: 38px 20px 18px;
}
.prime-banner-title {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(22px, 5vw, 28px);
  line-height: 1.15;
  letter-spacing: -0.015em;
  color: var(--text);
  margin: 0 0 6px;
}
.prime-banner-title em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.prime-banner-sub {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-2);
  line-height: 1.6;
}
.prime-banner-wins {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--border-soft);
}
.prime-win {
  padding: 12px 14px;
  border-right: 1px solid var(--border-soft);
  background: var(--surface);
}
.prime-win:last-child { border-right: none; }
.prime-win-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.prime-win-text {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  line-height: 1.45;
}

/* ---------- execution mode switcher ---------- */
.exec-mode {
  margin: 14px 0 0;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.exec-mode.am { border-left-color: var(--cyan); }
.exec-mode.lunch { border-left-color: var(--moss); background: rgba(122,146,104,0.04); }
.exec-mode.pm { border-left-color: var(--accent); background: rgba(217,119,66,0.04); }
.exec-mode.no-zero { border-left-color: var(--signal); background: rgba(184,92,60,0.05); }

.exec-mode-left {
  flex: 1;
  min-width: 0;
}
.exec-mode-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 4px;
}
.exec-mode-value {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
}
.exec-mode.am .exec-mode-value { color: var(--cyan); }
.exec-mode.lunch .exec-mode-value { color: var(--moss); }
.exec-mode.pm .exec-mode-value { color: var(--accent); }
.exec-mode.no-zero .exec-mode-value { color: var(--signal); }
.exec-mode-cutoff {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-mute);
  margin-top: 4px;
  letter-spacing: 0.08em;
}
.exec-mode-cutoff b { color: var(--signal); font-weight: 600; }
.exec-mode-btns {
  display: flex;
  gap: 6px;
}
.exec-mode-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 8px 10px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text-mute);
  cursor: pointer;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.exec-mode-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.exec-mode-btn.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.exec-mode-btn.am.active { background: rgba(91,138,153,0.12); border-color: var(--cyan); color: var(--cyan); }
.exec-mode-btn.lunch.active { background: rgba(122,146,104,0.12); border-color: var(--moss); color: var(--moss); }
.exec-mode-btn.pm.active { background: rgba(217,119,66,0.12); border-color: var(--accent); color: var(--accent); }
.exec-mode-btn.no-zero.active { background: rgba(184,92,60,0.12); border-color: var(--signal); color: var(--signal); }

/* ---------- PM fallback banner inside training section ---------- */
.pm-banner {
  margin: 4px 16px 10px;
  padding: 10px 12px;
  background: rgba(217,119,66,0.06);
  border-left: 2px solid var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.55;
  color: var(--text-2);
}
.pm-banner strong { color: var(--accent); font-weight: 600; }

/* ---------- sauna section ---------- */
.sauna-section {
  margin: 28px 0;
  border: 1px solid var(--border-soft);
  background: rgba(91,138,153,0.04);
}
.sauna-section .section-head { border-bottom: 1px solid var(--border-soft); }
.sauna-section .section-num { color: var(--cyan); }
.sauna-section .section-tag { color: var(--cyan); border-color: rgba(91,138,153,0.3); }
.sauna-body { padding: 14px 16px; }
.sauna-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-soft);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.sauna-row:last-child { border-bottom: none; }
.sauna-row.checked .task-box { border-color: var(--cyan); background: rgba(91,138,153,0.12); }
.sauna-row.checked .task-box::after { background: var(--cyan); transform: scale(1); }
.sauna-row.checked .sauna-text { color: var(--text-mute); }
.sauna-text {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
}
.sauna-text small {
  display: block;
  font-size: 10px;
  color: var(--text-mute);
  margin-top: 4px;
  letter-spacing: 0.04em;
}
.sauna-note {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-mute);
  font-style: italic;
  line-height: 1.55;
}

/* ---------- prog bar (sticky bottom) ---------- */
.prog {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: rgba(8, 9, 10, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  z-index: 80;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.prog-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 12px var(--pad);
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 12px;
  align-items: center;
}
.prog-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
}
.prog-track {
  height: 4px;
  background: var(--surface);
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border-soft);
}
.prog-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  width: 0%;
  transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
/* legacy classes — kept for safety, no longer rendered */
.prog-pct { display: none; }
.prog-track { display: none; }

.prog-mission {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-mute);
  white-space: nowrap;
  flex-shrink: 0;
}
.prog-mission .dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 1.5px solid var(--text-mute);
  background: transparent;
  flex-shrink: 0;
  transition: all 0.25s ease;
}
.prog-mission.win {
  color: var(--moss);
  font-weight: 600;
}
.prog-mission.win .dot {
  background: var(--moss);
  border-color: var(--moss);
  box-shadow: 0 0 8px rgba(122,146,104,0.6);
}
.prog-mission.muted { color: var(--text-faint); }
.prog-mission.muted .dot { border-color: var(--text-faint); }

.prog-week {
  display: flex;
  gap: 4px;
  align-items: center;
  justify-content: center;
  min-width: 0;
  overflow: hidden;
}
.prog-week-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0;
  color: var(--text-mute);
  text-transform: uppercase;
  flex-shrink: 0;
  transition: all 0.2s ease;
}
.prog-week-dot.complete {
  background: var(--moss);
  border-color: var(--moss);
  color: var(--bg);
  font-weight: 700;
}
.prog-week-dot.future {
  border-style: dashed;
  border-color: var(--text-faint);
  color: var(--text-faint);
}
.prog-week-dot.today {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--accent);
}
.prog-week-dot.today:not(.complete) {
  color: var(--accent);
  font-weight: 600;
}

.prog-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mute);
  width: 36px;
  height: 36px;
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
}
.prog-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- realign button (in prog bar) ---------- */
.prog-btn-text {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  height: 36px;
  padding: 0 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.prog-btn-text:hover { border-color: var(--accent); color: var(--accent); }
.prog-btn-text:active { transform: translateY(1px); }

/* ---------- realign modal (drift check) ---------- */
.modal--realign { max-width: 560px; }
.realign-intro {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 300;
  font-style: italic;
  color: var(--text-2);
  line-height: 1.55;
  margin: 0 0 24px;
  padding: 0 4px;
  letter-spacing: -0.005em;
}

.realign-section {
  margin-bottom: 28px;
}
.realign-section:last-child { margin-bottom: 0; }
.realign-section-hd {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.realign-section-hd .meta {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  color: var(--text-mute);
  text-transform: uppercase;
}

/* anchor cards (personal) */
.anchor {
  padding: 16px 18px;
  border: 1px solid var(--border-soft);
  border-left: 2px solid var(--accent);
  background: var(--surface);
  margin-bottom: 10px;
}
.anchor:last-child { margin-bottom: 0; }
.anchor-name {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.anchor-text {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  line-height: 1.45;
  color: var(--text);
  letter-spacing: -0.005em;
}
.anchor-text em { font-style: italic; color: var(--text-2); }
.anchor-quote {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border-soft);
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.5;
}
.anchor-quote-attr {
  display: block;
  margin-top: 6px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-mute);
  font-style: normal;
}

/* operator code (one-liner principles) */
.code-list { padding: 0; margin: 0; list-style: none; }
.code-line {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--border-soft);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  color: var(--text);
}
.code-line:last-child { border-bottom: none; }
.code-line .idx {
  flex-shrink: 0;
  width: 24px;
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--text-faint);
  padding-top: 2px;
}
.code-line .body { flex: 1; }
.code-line .body em { font-style: italic; color: var(--text-mute); }

/* quotes */
.quote-block {
  margin-bottom: 18px;
  padding: 14px 0 0 14px;
  border-left: 2px solid var(--border);
}
.quote-block:last-child { margin-bottom: 0; }
.quote-text {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.5;
  color: var(--text);
  letter-spacing: -0.005em;
}
.quote-text::before { content: '“'; color: var(--accent); margin-right: 2px; }
.quote-text::after  { content: '”'; color: var(--accent); margin-left: 2px; }
.quote-attr {
  display: block;
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
}
.quote-attr b { color: var(--accent); font-weight: 600; }
.quote-attr .src {
  font-style: italic;
  text-transform: none;
  letter-spacing: 0.04em;
  color: var(--text-mute);
  margin-left: 4px;
}

@media (max-width: 480px) {
  .prog-btn-text { padding: 0 8px; font-size: 9px; letter-spacing: 0.14em; }
  .anchor-text { font-size: 16px; }
  .quote-text { font-size: 15px; }
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 16px 40px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%;
  max-width: 460px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  position: relative;
  margin: auto 0;
}
.modal-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border-soft);
}
.modal-hd h3 {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.005em;
}
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mute);
  width: 30px; height: 30px;
  font-family: var(--mono);
  cursor: pointer;
  font-size: 14px;
}
.modal-close:hover { color: var(--accent); border-color: var(--accent); }
.modal-body { padding: 18px; }
.modal-body .field { margin-bottom: 22px; }
.modal-body .field:last-child { margin-bottom: 0; }
.modal-body .field-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 10px;
}
.opt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.opt-grid button {
  padding: 14px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s ease;
}
.opt-grid button:hover { border-color: var(--accent); color: var(--accent); }
.opt-grid button.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.danger-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--signal);
  color: var(--signal);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 6px;
}
.danger-btn:hover { background: rgba(184,92,60,0.1); }

.foot {
  text-align: center;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 40px 16px 20px;
}
.foot .dot { color: var(--accent); }

.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elev);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  z-index: 90;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.complete-banner {
  margin: 32px 0;
  padding: 22px;
  border: 1px solid var(--moss);
  background: rgba(122,146,104,0.06);
  text-align: center;
}
.complete-banner h3 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 400;
  margin: 0 0 6px;
  color: var(--moss);
  letter-spacing: -0.01em;
}
.complete-banner p {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin: 0;
}

@media (max-width: 480px) {
  body { font-size: 13px; }
  .hero { padding: 24px 0 20px; }
  .stat { padding: 12px 10px; }
  .stat-value { font-size: 18px; }
  .meal-time { width: 64px; font-size: 8px; }
  .opt-grid { grid-template-columns: 1fr; }
  .prog-inner { gap: 8px; }
  .prog-mission { font-size: 10px; gap: 6px; letter-spacing: 0.12em; }
  .prog-mission .dot { width: 9px; height: 9px; }
  .prog-week-dot { width: 18px; height: 18px; font-size: 8px; }
  .prog-week { gap: 3px; }
  .protein-list .food-item { grid-template-columns: 1fr auto; }
  .level-meta { font-size: 9px; }
  .review-grid { grid-template-columns: 1fr; }
  .energy-chips { gap: 4px; }
  .energy-chip { width: 26px; height: 26px; font-size: 10px; }
}

/* ============================================================
   PROGRESSION — level badge in stat strip + graduation card
   ============================================================ */
.level-badge {

<script>
/* ============================================================
   STATE & STORAGE
   ============================================================ */
const STORAGE_KEY = 'quickle_v1';
const DAY_NAMES = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DAY_DISPLAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dayName() { return DAY_NAMES[new Date().getDay()]; }

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultStore();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultStore(), parsed);
  } catch (e) {
    return defaultStore();
  }
}
function defaultStore() {
  return {
    history: {},                 // per-day: { sleep, checks, exec, energy, discomfortType }
    settings: {
      snack: null,
      units: 'imperial',
      sauna: false,
      travel: false,
      programStart: null,        // ISO date string, set on first day
    },
    level: 1,                    // 1..6
    weekly: {                    // weekly metrics keyed by ISO week start (Monday)
      // 'YYYY-MM-DD': { weight, waist, elevation, note }
    },
    reviews: {                   // Sunday review answers keyed by Sunday date
      // 'YYYY-MM-DD': { adherence, sleep, friction, fixOne, completedAt }
    },
    gradDeferred: null,          // 'YYYY-MM-DD' to suppress graduation card temporarily
  };
}
function saveStore(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}
let store = loadStore();

// Backfill new fields for stores created before this build
if (!store.level) store.level = 1;
if (!store.weekly) store.weekly = {};
if (!store.reviews) store.reviews = {};
if (!store.settings.travel) store.settings.travel = false;
if (!store.settings.programStart) {
  // First-ever load → mark program start
  store.settings.programStart = todayKey();
}

/* ============================================================
   WEEK MATH HELPERS
   ============================================================ */
function isoWeekStart(dateOrKey) {
  const d = (typeof dateOrKey === 'string')
    ? new Date(dateOrKey + 'T12:00:00')
    : new Date(dateOrKey.getTime());
  d.setHours(0,0,0,0);
  const dow = d.getDay();                         // 0=Sun
  const sinceMon = (dow === 0) ? 6 : (dow - 1);
  d.setDate(d.getDate() - sinceMon);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function weekWinCount(weekStartKey) {
  let wins = 0;
  const start = new Date(weekStartKey + 'T12:00:00');
  for (let i = 0; i < 7; i++) {
    const d = new Date(start.getTime() + i * 86400000);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (isDayComplete(k)) wins++;
  }
  return wins;
}

function lastNWeeks(n) {
  const out = [];
  let cur = new Date();
  for (let i = 0; i < n; i++) {
    const k = isoWeekStart(cur);
    out.unshift(k);
    cur = new Date(cur.getTime() - 7 * 86400000);
  }
  // dedupe in case of edge
  return [...new Set(out)];
}

function getToday() {
  const k = todayKey();
  if (!store.history[k]) {
    store.history[k] = { sleep: null, checks: {}, exec: 'am' };
  }
  // Migrate legacy exec values
  if (!store.history[k].exec || store.history[k].exec === 'standard') store.history[k].exec = 'am';
  if (store.history[k].exec === 'delayed') store.history[k].exec = 'pm';
  // Snapshot current travel mode onto the day (for accurate historical scoring)
  store.history[k].travel = !!store.settings.travel;
  return store.history[k];
}

/* ============================================================
   TRAINING PLANS
   ============================================================ */

/* ============================================================
   DAILY ANCHORS — rotate by day-of-week
   ============================================================ */

const DAILY_ANCHORS = [
  /* Sun */ 'So Lizzie can be proud of the man she married.',
  /* Mon */ 'So you can run with Ana and Ava — and chase their children one day.',
  /* Tue */ 'The mass of men lead lives of quiet desperation. Not today.',
  /* Wed */ 'Pace, not panic. The mountain rewards rhythm.',
  /* Thu */ 'You have power over your mind — not outside events. — Marcus Aurelius',
  /* Fri */ 'Difficulties strengthen the mind, as labor does the body. — Seneca',
  /* Sat */ 'Because it\'s there. — Mallory',
];

/* ============================================================
   DISCOMFORT PRACTICE — rotates weekly (by ISO week start)
   ============================================================ */

const DISCOMFORT_PRACTICES = [
  {
    name: 'Cold shower',
    detail: '2–3 minutes at the end of a normal shower. Slow breathing. Don\'t flinch.',
  },
  {
    name: 'Box breathing under load',
    detail: '10 min. 4 in / 4 hold / 4 out / 4 hold. Do during a walk or sit upright.',
  },
  {
    name: 'Fasted walk',
    detail: '20 min. Before any food. Just water + LMNT. Be hungry. Notice it.',
  },
  {
    name: 'Silent walk',
    detail: '20 min during a daily walk. No podcast. No music. No phone. Just be.',
  },
];

function thisWeekDiscomfort() {
  const wk = isoWeekStart(new Date());
  // Stable hash from week string
  let h = 0;
  for (let i = 0; i < wk.length; i++) h = (h * 31 + wk.charCodeAt(i)) | 0;
  const idx = Math.abs(h) % DISCOMFORT_PRACTICES.length;
  return DISCOMFORT_PRACTICES[idx];
}

/* ============================================================
   PROGRESSION LEVELS — the long arc

function consecutiveStrongWeeks() {
  // Walk backward from last complete week (last week, not current)
  let cur = new Date();
  cur.setDate(cur.getDate() - 7);             // start from a week ago
  let count = 0;
  for (let i = 0; i < 52; i++) {
    const wk = isoWeekStart(cur);
    if (weekWinCount(wk) >= 5) count++;
    else break;
    cur = new Date(cur.getTime() - 7 * 86400000);
  }
  return count;
}

function maxSaturdayElevation() {
  let max = 0;
  Object.values(store.weekly || {}).forEach(w => {
    if (w && typeof w.elevation === 'number' && w.elevation > max) max = w.elevation;
  });
  return max;
}

function maxStreakEver() {
  // Count longest ever continuous run of complete days in history
  const dates = Object.keys(store.history || {}).sort();
  if (!dates.length) return 0;
  let best = 0, run = 0;
  let prev = null;
  for (const k of dates) {
    if (!isDayComplete(k)) { run = 0; prev = k; continue; }
    if (prev) {
      const pd = new Date(prev + 'T12:00:00');
      const cd = new Date(k + 'T12:00:00');
      const gap = (cd - pd) / 86400000;
      if (gap === 1) run++;
      else run = 1;
    } else {
      run = 1;
    }
    if (run > best) best = run;
    prev = k;
  }
  return best;
}

function saturdayElevationTarget() {
  // Nudge up every 4 program weeks; base = 1500 ft, +250 each block, level adjusted
  const start = store.settings.programStart || todayKey();
  const startDate = new Date(start + 'T12:00:00');
  const today = new Date();
  const programWeeks = Math.floor((today - startDate) / (7 * 86400000));
  const blocks = Math.floor(programWeeks / 4);
  const lvl = store.level || 1;
  const baseByLevel = { 1: 1500, 2: 2500, 3: 4000, 4: 5500, 5: 7000, 6: 7000 };
  const base = baseByLevel[lvl] || 1500;
  return base + (blocks * 250);
}

/* ============================================================
   ELEMENT HELPER
   ============================================================ */

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'html') e.innerHTML = attrs[k];
      else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
      else if (k === 'dataset') Object.assign(e.dataset, attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

  const checked = !!today.checks[meal.id];

  let listHTML = '';
  if (meal.items === 'SNACK') {
    const snack = store.settings.snack;
    if (snack === 'yogurt') listHTML = '<span class="b">·</span>Plain Greek yogurt';
    else if (snack === 'eggs') listHTML = '<span class="b">·</span>2 hard-boiled eggs';
    else listHTML = '<span style="color:var(--signal)">⚠ Choose option in Settings</span>';
  } else {
    listHTML = meal.items.map(i => `<div><span class="b">·</span>${i}</div>`).join('');
  }

  const box = el('div', { class: 'task-box' });
  const body = el('div', { class: 'meal-body' });
  body.appendChild(el('div', { class: 'meal-list', html: listHTML }));
  if (meal.note) body.appendChild(el('div', { class: 'meal-note' }, meal.note));

  const content = el('div', { class: 'meal-content' }, box, body);
  const time = el('div', { class: 'meal-time', html: `<b>${meal.timeLabel}</b>${meal.timeSub}` });
  const row = el('div', { class: 'meal-item' + (checked ? ' checked' : ''), dataset: { id: meal.id }, onclick: () => toggleCheck(meal.id) }, time, content);
  return row;
}

  const mtn = el('div', { class: 'mtn-block' });
  const units = store.settings.units === 'metric' ? { weight: 'kg', dist: 'm' } : { weight: 'lb', dist: 'ft' };

  function field(label, key, type, placeholder) {
    const row = el('div', { class: 'mtn-field' });
    row.appendChild(el('div', { class: 'mtn-field-label' }, label));
    const tag = type === 'text' ? 'textarea' : 'input';
    const input = document.createElement(tag);
    if (type !== 'text') input.type = type;
    if (placeholder) input.placeholder = placeholder;
    input.value = wkData[key] != null ? wkData[key] : '';
    input.addEventListener('change', () => {
      if (!store.weekly) store.weekly = {};
      if (!store.weekly[wk]) store.weekly[wk] = {};
      const v = input.value.trim();
      if (v === '') {
        delete store.weekly[wk][key];
      } else {
        store.weekly[wk][key] = (type === 'number') ? parseFloat(v) : v;
      }
      saveStore(store);
      // Update sparklines if relevant
      if (['waist','elevation'].includes(key)) updateHeader();

  const lvl = store.level || 1;

  // Suppress if user deferred today
  if (store.gradDeferred === todayKey()) return null;

  const results = def.graduationCriteria.map(c => ({ ...c, met: c.check() }));
  const allMet = results.every(r => r.met);
  if (!allMet) return null;

  const next = LEVELS[def.nextLevel];
  const card = el('div', { class: 'grad-card' });
  const body = el('div', { class: 'grad-body' });

    class: 'grad-btn',
    onclick: () => {
      if (!confirm('Advance to Level ' + def.nextLevel + ' — ' + next.name + '? This unlocks new training and progression criteria. You can\'t reverse this casually.')) return;
      store.level = def.nextLevel;
      saveStore(store);
      render();
      showToast('Level ' + store.level + ' unlocked — ' + next.name);
    }
  }, 'Begin Level ' + def.nextLevel);
  body.appendChild(goBtn);

  const deferBtn = el('button', {

      store.gradDeferred = todayKey();

      render();
      showToast('Maybe tomorrow');

  }, 'Not today');

  card.appendChild(body);
  return card;
}

function renderSundayReview() {
  if (dayName() !== 'sunday') return null;
  // Show only after midday Sunday (give the day time to develop)
  const hour = new Date().getHours();
  if (hour < 12) return null;

  // Last full week is the Monday→Sunday block ending today
  const sundayKey = todayKey();
  const monday = new Date();
  monday.setDate(monday.getDate() - 6);
  const monKey = monday.getFullYear() + '-' + String(monday.getMonth()+1).padStart(2,'0') + '-' + String(monday.getDate()).padStart(2,'0');
  const wkStartKey = isoWeekStart(monday); // same as monKey usually

  const existing = (store.reviews && store.reviews[sundayKey]) || null;
  const card = el('div', { class: 'review-card' });
  const body = el('div', { class: 'review-body' });

  if (existing && existing.completedAt) {
    body.innerHTML = '<div class="review-done"><b>Week reviewed.</b><br>One thing to fix this week:<br>"' + (existing.fixOne || '—') + '"</div>';
    card.appendChild(body);
    return card;
  }

  // Compute the week's wins
  const wins = weekWinCount(wkStartKey);
  const verdict = wins >= 5 ? 'excellent' : wins === 4 ? 'acceptable' : wins === 3 ? 'warning' : 'intervention';

  body.appendChild(el('h3', { class: 'review-title', html: 'Sunday <em>review</em>' }));
  const sum = el('div', { class: 'review-summary' });
  sum.innerHTML = 'Last week: <b>' + wins + ' wins</b> · ' + verdict + ' · 3 questions, then fix one thing.';
  body.appendChild(sum);

  // Build question state in memory
  if (!card._answers) card._answers = { adherence: null, sleep: null, friction: null, fixOne: '' };

  function makeQuestion(label, key, options) {
    const q = el('div', { class: 'review-q' });
    q.appendChild(el('div', { class: 'review-q-label' }, label));
    const grid = el('div', { class: 'review-grid' });
    options.forEach(opt => {
      const b = el('button', {
        class: 'review-opt' + (card._answers[key] === opt ? ' active' : ''),
        onclick: () => {
          card._answers[key] = opt;
          q.querySelectorAll('.review-opt').forEach(bb => bb.classList.remove('active'));
          b.classList.add('active');
          updateSubmitState();
        },
      }, opt);
      grid.appendChild(b);
    });
    q.appendChild(grid);
    return q;
  }

  body.appendChild(makeQuestion('Food adherence', 'adherence', ['Strong', 'Mixed', 'Slipped']));
  body.appendChild(makeQuestion('Sleep this week', 'sleep', ['Good', 'Choppy', 'Wrecked']));
  body.appendChild(makeQuestion('Biggest friction', 'friction', ['Time', 'Energy', 'Food', 'None']));

  // Fix-one field
  const fixQ = el('div', { class: 'review-q' });
  fixQ.appendChild(el('div', { class: 'review-q-label' }, 'One thing to fix this week'));
  const ta = document.createElement('textarea');
  ta.className = 'review-input';
  ta.placeholder = 'e.g. move LMNT next to the coffee maker';
  ta.addEventListener('input', () => {
    card._answers.fixOne = ta.value;
    updateSubmitState();
  });
  fixQ.appendChild(ta);
  body.appendChild(fixQ);

  const submit = el('button', { class: 'review-submit', disabled: 'disabled' }, 'Lock review');
  function updateSubmitState() {
    const ans = card._answers;
    const ready = ans.adherence && ans.sleep && ans.friction && ans.fixOne.trim().length > 0;
    if (ready) submit.removeAttribute('disabled'); else submit.setAttribute('disabled', 'disabled');
  }
  submit.addEventListener('click', () => {
    if (!store.reviews) store.reviews = {};
    store.reviews[sundayKey] = {
      ...card._answers,
      fixOne: card._answers.fixOne.trim(),
      wins: wins,
      completedAt: new Date().toISOString(),
    };
    saveStore(store);
    render();
    showToast('Review locked. One thing to fix.');
  });
  body.appendChild(submit);

  card.appendChild(body);
  return card;
}

  const today = getToday();
  today.sleep = answer;
  Object.keys(today.checks).forEach(k => {
    if (k.startsWith('circuit') || k.startsWith('int-') || k.startsWith('walk') || k === 'warmup' || k === 'cooldown' || k === 'z2' || k === 'mtn' || k === 'mtn-r' || k === 'pack' || k === 'pack-r' || k === 'mob' || k === 'mob-r' || k === 'pick-format') {
      delete today.checks[k];
    }
  });
  saveStore(store);
  render();
  showToast(answer === 'yes' ? 'Full plan loaded' : 'Reduced plan loaded');
}

function getActiveTaskIds() {
  const today = getToday();
  const day = dayName();
  const ids = [];
  MORNING_TRIGGER.forEach(t => ids.push(t.id));
  getActiveTrainingItems().forEach(t => ids.push(t.id));
  getActiveMeals().forEach(m => ids.push(m.id));
  if (day === 'saturday') { ids.push('wk-weigh'); }
  if (!store.settings.travel && (today.exec || 'am') !== 'no-zero' && day === 'thursday') {
    ids.push('discomfort');
  }
  // Sauna intentionally NOT counted — keeps it optional
  return ids;
}

function updateProgress() {
  const today = getToday();
  const todayK = todayKey();
  const isWin = isDayComplete(todayK);

  // ── Today's binary mission state
  const m = document.getElementById('prog-mission');
  m.classList.remove('win','muted');
  const label = m.querySelector('.label');
  if (today.sleep === null) {
    m.classList.add('muted');
    label.textContent = '—';
  } else if (isWin) {
    m.classList.add('win');
    label.textContent = 'Win';
  } else {
    label.textContent = 'Open';
  }

  // ── 7-day Mon-Sun scorecard
  renderWeekScorecard();

  // ── Mission-complete banner
  const existing = document.getElementById('complete-banner');
  if (isWin) {
    if (!existing) {
      const c = el('div', { class: 'complete-banner', id: 'complete-banner' });
      c.appendChild(el('h3', null, 'Mission complete.'));
      c.appendChild(el('p', null, 'Day logged. Hold the line tomorrow.'));
      const content = document.getElementById('content');
      content.insertBefore(c, content.firstChild);
    }
  } else if (existing) {
    existing.remove();
  }
}

function renderWeekScorecard() {
  const wk = document.getElementById('prog-week');
  if (!wk) return;
  wk.innerHTML = '';
  const now = new Date(); now.setHours(0,0,0,0);
  const dow = now.getDay();           // 0=Sun, 1=Mon, ..., 6=Sat
  const sinceMonday = (dow === 0) ? 6 : (dow - 1);
  const monday = new Date(now.getTime() - sinceMonday * 86400000);
  const labels = ['M','T','W','T','F','S','S'];
  const todayK = todayKey();
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday.getTime() + i * 86400000);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const isToday = (k === todayK);
    const isFuture = d > now;
    const complete = isDayComplete(k);
    const dot = el('div', { class: 'prog-week-dot' }, labels[i]);
    if (complete) dot.classList.add('complete');
    if (isFuture) dot.classList.add('future');
    if (isToday)  dot.classList.add('today');
    wk.appendChild(dot);
  }
}

function computeStreak() {
  let streak = 0;
  const oneDay = 86400000;
  let cursor = new Date();
  cursor.setHours(0,0,0,0);

  const todayK = todayKey();
  const today = store.history[todayK];
  const todayDone = today && isDayComplete(todayK);
  if (!todayDone) {
    cursor = new Date(cursor.getTime() - oneDay);
  }

  while (true) {
    const k = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
    if (isDayComplete(k)) {
      streak++;
      cursor = new Date(cursor.getTime() - oneDay);
    } else break;
    if (streak > 365) break;
  }
  return streak;
}

function isDayComplete(dateKey) {
  const data = store.history[dateKey];
  if (!data || !data.sleep) return false;
  const d = new Date(dateKey + 'T12:00:00');
  const dn = DAY_NAMES[d.getDay()];
  let exec = data.exec || 'am';
  // Migrate legacy values
  if (exec === 'standard') exec = 'am';
  if (exec === 'delayed')  exec = 'pm';
  const ids = [];
  MORNING_TRIGGER.forEach(t => ids.push(t.id));
  if (exec === 'no-zero') {
    NO_ZERO_PLAN.items.forEach(t => ids.push(t.id));
  } else {
    const plan = getPlan(dn);
    if (exec === 'pm' && plan.pmUnsafe && plan.shiftFallback) {
      plan.shiftFallback.forEach(t => ids.push(t.id));
    } else {
      const mode = data.sleep === 'yes' ? 'full' : 'reduced';
      plan[mode].forEach(t => ids.push(t.id));
    }
  }
  getActiveMeals().forEach(m => ids.push(m.id));
  if (dn === 'saturday') { ids.push('wk-weigh'); }
  // Discomfort task on Thursdays for non-no-zero non-travel days
  if (dn === 'thursday' && exec !== 'no-zero' && !data.travel) {
    ids.push('discomfort');
  }
  return ids.every(id => data.checks && data.checks[id]);
}

function updateStreak() {
  const s = computeStreak();
  document.getElementById('stat-streak').innerHTML = s + '<span class="unit">d</span>';
}

function updateHeader() {
  const now = new Date();
  const day = dayName();
  const idx = now.getDay();
  document.getElementById('hero-day').innerHTML = DAY_DISPLAY[idx] + '<em>.</em>';

  // Day-of-program count from programStart (preferred) or history fallback
  const startKey = (store.settings && store.settings.programStart) || Object.keys(store.history).sort()[0] || todayKey();
  const start = new Date(startKey + 'T12:00:00');
  const today = new Date(todayKey() + 'T12:00:00');
  const dayNum = Math.floor((today - start) / 86400000) + 1;
  const weekNum = Math.ceil(dayNum / 7);
  document.getElementById('hero-daynum').textContent = String(dayNum).padStart(2,'0');
  document.getElementById('hero-week').textContent = 'Week ' + String(weekNum).padStart(2,'0');

  const plan = getPlan(day);
  const heroMission = document.getElementById('hero-mission');
  heroMission.innerHTML = '<span class="bar"></span><span>' + plan.mission.toUpperCase() + '</span>';

  // Level
  const lvl = store.level || 1;
  const lvlEl = document.getElementById('stat-level');
  if (lvlEl) lvlEl.innerHTML = 'L' + lvl + '<span class="unit">' + (LEVELS[lvl] ? LEVELS[lvl].name.toLowerCase().split(' ')[0] : '') + '</span>';

  document.getElementById('meta-date').textContent = todayKey();
  document.getElementById('meta-time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

  // Trend cell — prefers waist sparkline if there's data, else target weight
  updateTrendCell();
}

function updateTrendCell() {
  const labelEl = document.getElementById('stat-trend-label');
  const targetEl = document.getElementById('stat-target');
  const spark = document.getElementById('spark-waist');
  if (!labelEl || !targetEl || !spark) return;

  // Gather waist series, oldest first
  const series = [];
  Object.keys(store.weekly || {}).sort().forEach(k => {
    const w = store.weekly[k];
    if (w && typeof w.waist === 'number' && !isNaN(w.waist)) {
      series.push({ k, v: w.waist });
    }
  });

  if (series.length >= 2) {
    labelEl.textContent = 'Waist';
    const latest = series[series.length - 1].v;
    targetEl.innerHTML = latest.toFixed(1) + '<span class="unit">in</span>';
    // Build path
    const n = series.length;
    const vals = series.map(s => s.v);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const range = (max - min) || 1;
    const pts = series.map((s, i) => {
      const x = (i / (n - 1)) * 100;
      // Invert y so down = down (lower waist plots lower)
      const y = 16 - ((s.v - min) / range) * 14;
      return [x, y];
    });
    let d = 'M ' + pts.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L ');
    const last = pts[pts.length - 1];
    spark.innerHTML = '<path d="' + d + '" /><circle class="dot" cx="' + last[0].toFixed(1) + '" cy="' + last[1].toFixed(1) + '" r="1.6" />';
    spark.classList.toggle('moss', latest <= vals[0]); // moss when trending down
    spark.style.display = 'block';
  } else {
    labelEl.textContent = 'Target';
    if (store.settings.units === 'metric') {
      targetEl.innerHTML = '88<span class="unit">kg</span>';
    } else {
      targetEl.innerHTML = '195<span class="unit">lb</span>';
    }
    spark.style.display = 'none';
  }
}

  const today = getToday();

  if (today.sleep === null) {
    // Travel banner shows even before sleep set

    if (tb) content.appendChild(tb);
    content.appendChild(renderSleepGate());
    content.appendChild(renderPrimeRule());
    content.appendChild(renderRules());
    content.appendChild(renderEmergency());
  } else {
    // Top-of-day cards: travel banner → Sunday review (if applicable) → graduation (if earned)
    const tb = renderTravelBanner();
    if (tb) content.appendChild(tb);
    const review = renderSundayReview();
    if (review) content.appendChild(review);
    const grad = renderGraduationCard();
    if (grad) content.appendChild(grad);

    content.appendChild(renderSleepStatus());
    content.appendChild(renderExecModeSwitcher());
    content.appendChild(renderPrimeRule());
    content.appendChild(renderMorningSection());
    content.appendChild(renderTrainingSection());
    content.appendChild(renderMealsSection());
    const sauna = renderSauna();
    if (sauna) content.appendChild(sauna);
    content.appendChild(renderRules());
    const wk = renderWeeklyCheck();
    if (wk) content.appendChild(wk);
    content.appendChild(renderEmergency());
  }

  updateHeader();
  updateProgress();
  updateStreak();
}
